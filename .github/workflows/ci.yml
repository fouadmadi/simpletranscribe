# GitHub Actions CI for SimpleTranscribe
# This workflow builds both macOS (Swift) and Windows (.NET) projects to validate successful builds on push and PR.

name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build Windows (.NET)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get Version from Git
        id: get_version
        shell: bash
        run: |
          # Use tag if present, else use commit hash and date
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            VERSION="$TAG"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)-$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore ./simpletranscribe-win/SimpleTranscribe.sln
      - name: Build
        run: dotnet build ./simpletranscribe-win/SimpleTranscribe.sln --configuration Release --no-restore /p:BUILD_VERSION=${{ env.VERSION }}
      - name: Publish
        run: dotnet publish ./simpletranscribe-win/SimpleTranscribe/SimpleTranscribe.csproj -c Release -r win-x64 --self-contained -o ./simpletranscribe-win/publish /p:BUILD_VERSION=${{ env.VERSION }}

      # Inject version into Info.plist for macOS
      # This step will be added to the macOS build job
      
      - name: Build Installer (Inno Setup)
        run: |
          iscc ./simpletranscribe-win/SimpleTranscribe.Installer/SimpleTranscribe.iss
        continue-on-error: true
      - name: Upload Windows Installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ./simpletranscribe-win/SimpleTranscribe.Installer/Output/SimpleTranscribe-Setup.exe
      # - name: Run Tests
      #   run: echo "Unit tests disabled for Windows in CI pipeline"
      #   # dotnet test ./simpletranscribe-win/SimpleTranscribe.sln --configuration Release --no-build --verbosity normal --filter "Category!=Integration&Category!=Performance"

  build-macos:
    name: Build macOS (Swift)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest
      - name: Inject Version into Info.plist
        shell: bash
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            VERSION="$TAG"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)-$(date +%Y%m%d)"
          fi
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" simpletranscribe-mac/simpletranscribe/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" simpletranscribe-mac/simpletranscribe/Info.plist
      - name: Build
        run: |
          cd simpletranscribe-mac
          xcodebuild -scheme simpletranscribe -project simpletranscribe.xcodeproj -configuration Release build
      - name: Debug DerivedData
        run: |
          echo "Listing DerivedData:"
          ls -lR ~/Library/Developer/Xcode/DerivedData || true

      - name: Archive .app if exists
        run: |
          mkdir -p simpletranscribe-mac/macos-artifacts
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" | grep -i simpletranscribe | head -n 1)
          if [ -d "$APP_PATH" ]; then
            cp -R "$APP_PATH" simpletranscribe-mac/macos-artifacts/
            cd simpletranscribe-mac/macos-artifacts
            zip -r simpletranscribe.app.zip simpletranscribe.app
          else
            echo "No .app found"
          fi
      - name: Set upload flag
        id: upload_flag
        run: |
          if [ -f simpletranscribe-mac/macos-artifacts/simpletranscribe.app.zip ]; then
            echo "should_upload=true" >> $GITHUB_OUTPUT
          else
            echo "should_upload=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload macOS App Zip
        if: steps.upload_flag.outputs.should_upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: simpletranscribe-mac/macos-artifacts/simpletranscribe.app.zip
     #- name: Run Unit Tests (Unit Only)
      #  run: |
       #    cd simpletranscribe-mac/simpletranscribe
          # Exclude integration/performance tests if they are categorized
          # If using XCTest with test class/method naming, use -skip-testing or -only-testing
          # xcodebuild test -scheme simpletranscribe -project ../simpletranscribe.xcodeproj -destination 'platform=macOS'
          # To skip specific tests, add:
          # xcodebuild test ... -skip-testing:simpletranscribeTests/IntegrationTests -skip-testing:simpletranscribeTests/PerformanceTests
